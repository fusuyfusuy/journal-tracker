name: docker
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [worker, api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: APP=${{ matrix.app }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
